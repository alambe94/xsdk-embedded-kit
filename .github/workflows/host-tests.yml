name: SDK Host Tests

on:
  workflow_dispatch:

jobs:
  host-tests:
    name: CMake host build and CTest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure host build
        run: python3 tools/xsdk.py configure host-ci

      - name: Build host targets
        run: python3 tools/xsdk.py build host-ci --no-configure

      - name: Run host tests
        run: python3 tools/xsdk.py test host-ci --no-configure

      - name: Upload compile commands
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands
          path: build/host-ci/compile_commands.json
