name: Sanitizer Builds

on:
  workflow_dispatch:

jobs:
  asan-ubsan:
    name: ASan + UBSan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure sanitizer build
        run: python3 tools/xsdk.py configure host-sanitizers

      - name: Build sanitizer targets
        run: python3 tools/xsdk.py build host-sanitizers --no-configure

      - name: Run tests under sanitizers
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: python3 tools/xsdk.py test host-sanitizers --no-configure
