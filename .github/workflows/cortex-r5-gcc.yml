name: Cortex-R5 GCC Cross-Compile

on:
  workflow_dispatch:
  pull_request:

jobs:
  cross-compile-r5:
    name: arm-none-eabi-gcc (Cortex-R5)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-arm-none-eabi

      - name: Build Cortex-R5 targets and generate size report
        run: |
          python3 tools/xsdk.py cross-build r5-gcc \
            --report size_report.txt \
            --markdown size_report.md
          cat size_report.md >> $GITHUB_STEP_SUMMARY

      - name: Archive libraries and size report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cortex-r5-libs
          path: |
            build/r5-gcc/**/*.a
            size_report.txt

  size-delta:
    name: Size delta comment
    needs: cross-compile-r5
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current size report
        uses: actions/download-artifact@v4
        with:
          name: cortex-r5-libs
          path: current

      - name: Download base branch size report
        id: base
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: cortex-r5-gcc.yml
          branch: ${{ github.base_ref }}
          name: cortex-r5-libs
          path: base
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Compute size delta
        run: |
          python3 tools/size_report.py \
            --compare current/size_report.txt \
            --base base/size_report.txt \
            --delta-markdown size_delta.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- xsdk-size-delta -->';
            const body = fs.readFileSync('size_delta.md', 'utf8');
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.issue.number,
                body: marker + '\n' + body,
              });
            }
