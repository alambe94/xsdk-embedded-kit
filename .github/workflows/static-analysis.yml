name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy-18

      - name: Configure host build (generate compile_commands.json)
        run: python3 tools/xsdk.py configure host-analysis

      - name: Run clang-tidy
        run: python3 tools/xsdk.py clang-tidy --report clang-tidy-report.txt

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: python3 tools/xsdk.py cppcheck --report cppcheck-report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt
