# am243x.cfg - OpenOCD config for AM243x Launchpad (LP-AM243).
#
# Targets MAIN domain Cortex-R5 core 0 (main0_r5.0) only; all other GDB
# server ports are disabled to reduce noise during bring-up.
#
# Adapter: XDS110 (on-board, via the USB-C JTAG port - NOT the device USB-C).
#
# Prerequisites:
#   * XDS110 driver installed (TI CCS or standalone XDS emulation package)
#   * openocd.exe at tools\openocd\bin\openocd.exe  (xsdk.bat setup openocd)
#
# GDB server ports assigned by OpenOCD for AM243x Launchpad:
#   3333 - sysctrl (M3, boot ROM context)
#   3334 - mcu_r5.0  (MCU_R5FSS0_0)
#   3335 - mcu_r5.1  (MCU_R5FSS0_1)
#   3336 - main0_r5.0   <- this config keeps only this one open
#   3337 - main0_r5.1
#
# Usage (from the xSDK root):
#   tools\openocd\bin\openocd.exe -s tools\openocd\scripts \
#       -f src/port/am243x/gdb/am243x.cfg
#
# Then in a second terminal:
#   arm-none-eabi-gdb -ex "target remote :3336" <elf>

source [find board/ti_am243_launchpad.cfg]

adapter speed 2000

foreach target_name [target names] {
    if {$target_name ne "am243.cpu.main0_r5.0"} {
        $target_name configure -gdb-port disabled
    }
}

targets am243.cpu.main0_r5.0
