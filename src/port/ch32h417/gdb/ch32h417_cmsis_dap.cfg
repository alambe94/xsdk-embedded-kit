# CH32H417 V5F OpenOCD config - WCH-LinkE in CMSIS-DAP mode
#
# Requires WCH-LinkE switched to CMSIS-DAP mode:
#   1. Press and hold the MODE button on WCH-LinkE for ~3 seconds while powered.
#   2. LED changes colour; device re-enumerates as VID=0D28 PID=0204.
#   3. Verify with: Get-PnpDevice -Class USB | Select FriendlyName,InstanceId
#
# Usage:
#   tools\openocd\bin\openocd.exe -f src/port/ch32h417/gdb/ch32h417_cmsis_dap.cfg
#
# Then in a second terminal:
#   tools\riscv_gcc\bin\riscv-none-elf-gdb.exe ^
#     -x src/port/ch32h417/gdb/ch32h417_v5f.gdb ^
#     build/ch32h417-riscv-gcc/src/port/ch32h417/ch32h417_bringup.elf

adapter driver cmsis-dap
transport select swd

# WCH-LinkE in CMSIS-DAP mode (8012) uses WCH's VID/PID and USB bulk (not HID).
# Requires WinUSB driver installed on Interface 0 via Zadig:
#   1. Download Zadig from https://zadig.akeo.ie
#   2. Options -> List All Devices
#   3. Select "WCH CMSIS-DAP" (VID=1A86 PID=8012, Interface 0)
#   4. Install WinUSB driver
cmsis-dap vid_pid 0x1a86 0x8012
cmsis-dap backend usb_bulk

set _CHIPNAME ch32h417
set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME riscv -chain-position $_TARGETNAME

# Conservative timeouts for initial bring-up
riscv set_reset_timeout_sec 5
riscv set_command_timeout_sec 10

# Prefer progbuf access for RISC-V abstract commands
riscv set_mem_access progbuf sysbus abstract

adapter speed 500

init
reset halt
