# CH32H417 V5F (hart 1, QingKeV5F, 400 MHz) OpenOCD config - WCH-LinkE native mode
#
# HARDWARE: RVSWD debug pin is PC1 (PIOC_IO0, GPIO_AF7) - NOT PA13/PA14.
#   Connect WCH-LinkE SWDIO to PC1. A 1 kOhm pull-up to VCC on PC1 is required.
#   WCH-LinkE SWDCK is a separate pin per WCH EVT board schematic.
#
# WCH-LinkE must be in native mode (VID=1A86 PID=8010):
#   - If currently in CMSIS-DAP mode (PID=8012), long-press MODE button ~3s.
#   - WCH USB driver for 1A86:8010 must be installed (WCH website or MRS).
#
# Requires WCH-patched OpenOCD: tools\openocd_wch\bin\openocd.exe
#   Run:  tools\setup_openocd_wch.bat   (or: xsdk.bat setup openocd-wch)
#
# Usage:
#   tools\openocd_wch\bin\openocd.exe -f src/port/ch32h417/gdb/ch32h417_v5f_wch.cfg
#
# One-shot flash:
#   tools\openocd_wch\bin\openocd.exe ^
#     -f src/port/ch32h417/gdb/ch32h417_v5f_wch.cfg ^
#     -c "program build/ch32h417-riscv-gcc/src/port/ch32h417/ch32h417_bringup.hex verify reset exit"
#
# Then in a second terminal:
#   tools\riscv_gcc\bin\riscv-none-elf-gdb.exe ^
#     -x src/port/ch32h417/gdb/ch32h417_v5f.gdb ^
#     build/ch32h417-riscv-gcc/src/port/ch32h417/ch32h417_bringup.elf

adapter driver wlinke
adapter speed 1000
transport select sdi

# wlink_set_address: use 0x00000000 (generic WCH default).
# CH32H417 V3F flash also starts at 0x00000000; RVSWD connects there first.
# V5F flash at 0x00010000 is set via the flash bank command below.
wlink_set_address 0x00000000

set _CHIPNAME ch32h417
sdi newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME.1 wch_riscv -chain-position $_TARGETNAME -coreid 1
$_TARGETNAME.1 configure -work-area-phys 0x200A0000 -work-area-size 0x4000 -work-area-backup 1

flash bank $_CHIPNAME.flash wch_riscv 0x00010000 0 0 0 $_TARGETNAME.1

init
# The current WCH OpenOCD fork cannot reliably reset hart 1, but halt and
# direct debug access work. Use GDB `load`, or program through the shared flash.
# If manually restarting after the application has entered user mode, force the
# debug resume privilege back to machine mode before jumping to flash:
#   reg dcsr 0x400003
#   reg pc 0x00010000
#   resume
halt
