# CH32H417 V5F RAM/ITRAM debug config - WCH-LinkE native mode
#
# This config intentionally avoids reserving a work area in RAM_CODE. The
# RAM build places vectors and executable code at 0x200A0000, so OpenOCD must
# not use that range as temporary scratch memory while GDB loads the ELF.
#
# Usage:
#   tools\openocd_wch\bin\openocd.exe -f src/port/ch32h417/gdb/ch32h417_v5f_wch_ram.cfg

adapter driver wlinke
adapter speed 100
transport select sdi

wlink_set_address 0x00000000

set _CHIPNAME ch32h417
sdi newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu

target create $_TARGETNAME.1 wch_riscv -chain-position $_TARGETNAME -coreid 1

# When GDB issues 'disconnect', resume the chip so it keeps running
# without GDB attached. Without this, OpenOCD halts the target on detach.
$_TARGETNAME.1 configure -event gdb-detach { resume }

# Expose trigger CSRs (tselect=0x7A0, tdata1=0x7A1, tdata2=0x7A2) so GDB
# can clear stale hardware breakpoints left by previous sessions.
# Must come before 'init'.
riscv expose_csrs 1952=tselect,1953=tdata1,1954=tdata2

init
halt
