# CH32H417 Dual-Core (V5F + V3F) OpenOCD config - WCH-LinkE native mode
#
# Status: experimental. Use ch32h417_v5f_wch.cfg for normal flashing and
# single-core V5F debugging. The WCH OpenOCD fork reports the CH32H417 harts
# through one SDI TAP, but creating two wch_riscv targets on that TAP can make
# reset/halt unstable on some probes. This file is kept for dual-core discovery
# and GDB attachment experiments.
#
# Hart 1: QingKe V5F (GDB port 3333, Flash: 0x00010000)
# Hart 0: QingKe V3F (GDB port 3334, Flash: 0x00000000)
#
# HARDWARE: RVSWD debug pin is PC1 (PIOC_IO0, GPIO_AF7) - NOT PA13/PA14.
#   Connect WCH-LinkE SWDIO to PC1. A 1 kOhm pull-up to VCC on PC1 is required.
#
# WCH-LinkE must be in native mode (VID=1A86 PID=8010):
#   - If currently in CMSIS-DAP mode (PID=8012), long-press MODE button ~3s.
#   - WCH USB driver for 1A86:8010 must be installed (WCH website or MRS).
#
# Requires WCH-patched OpenOCD: tools\openocd_wch\bin\openocd.exe
#
# Usage:
#   tools\openocd_wch\bin\openocd.exe -f src/port/ch32h417/debug/ch32h417_dual_core_wch.cfg
#
# Canonical one-shot V5F flash:
#   tools\openocd_wch\bin\openocd.exe ^
#     -f src/port/ch32h417/debug/ch32h417_v5f_wch.cfg ^
#     -c "program build/ch32h417-riscv-gcc/src/port/ch32h417/ch32h417_bringup.hex verify reset exit"
#
# V5F GDB:
#   tools\riscv_gcc\bin\riscv-none-elf-gdb.exe ^
#     -ex "target extended-remote localhost:3333" ^
#     build/ch32h417-riscv-gcc/src/port/ch32h417/ch32h417_bringup.elf
#
# V3F GDB uses localhost:3334 once a V3F ELF exists.
#

adapter driver wlinke
adapter speed 500
transport select sdi

wlink_set_address 0x00000000

set _CHIPNAME ch32h417
sdi newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu

# Hart 1 (V5F) - current xSDK bring-up target.
target create $_TARGETNAME.1 wch_riscv -chain-position $_TARGETNAME -coreid 1
$_TARGETNAME.1 configure -work-area-phys 0x200A0000 -work-area-size 0x4000 -work-area-backup 1
$_TARGETNAME.1 configure -gdb-port 3333
$_TARGETNAME.1 configure -event reset-init {
    echo "Hart 1 (V5F) reset initialized."
}
flash bank $_CHIPNAME.flash1 wch_riscv 0x00010000 0 0 0 $_TARGETNAME.1

# Hart 0 (V3F) - reserved for the later co-processor bring-up milestone.
target create $_TARGETNAME.0 wch_riscv -chain-position $_TARGETNAME -coreid 0
$_TARGETNAME.0 configure -work-area-phys 0x20100000 -work-area-size 0x4000 -work-area-backup 1
$_TARGETNAME.0 configure -gdb-port 3334
$_TARGETNAME.0 configure -event reset-init {
    echo "Hart 0 (V3F) reset initialized."
}
flash bank $_CHIPNAME.flash0 wch_riscv 0x00000000 0 0 0 $_TARGETNAME.0

init

# Avoid reset halt by default: on the current WCH OpenOCD fork the duplicate
# dual-target setup may fail reset/halt even when the V5F-only script succeeds.
# For manual experiments after init:
#   targets
#   ch32h417.cpu.1 halt
#   ch32h417.cpu.0 halt
